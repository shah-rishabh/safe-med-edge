name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv
      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Setup Python (uv will manage env, but this helps consistency)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Install dependencies via uv
      - name: Install dependencies
        run: |
          uv sync --all-extras

      # Lint
      - name: Lint with ruff
        run: |
          uv run ruff check .

      # Format check
      - name: Check formatting
        run: |
          uv run ruff format --check .

      # Run tests with coverage
      - name: Run tests
        run: |
          uv run pytest --cov=llm --cov-report=term-missing --cov-fail-under=70

      # Cache uv
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
